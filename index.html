<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zaapiz – Link Tree</title>
  <style>
    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Cotton-candy scrolling background ─────────────────────── */
    html {
      min-height: 100%;
    }
    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      /* default cotton-candy – updated live by JS on scroll */
      background: linear-gradient(
        180deg,
        #ffd6f5 0%,
        #f9bce8 20%,
        #c8aaff 60%,
        #a0c4ff 100%
      );
      background-attachment: fixed;
      transition: background 0.3s ease;
      overflow-x: hidden;
    }

    /* ── Page wrapper ───────────────────────────────────────────── */
    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 60px 20px 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* ── Avatar / Profile ───────────────────────────────────────── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      animation: fadeDown 0.7s ease both;
    }
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff9de2, #a78bfa, #60c5ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      box-shadow: 0 4px 24px rgba(180, 100, 255, 0.35);
      border: 3px solid rgba(255,255,255,0.6);
    }
    .username {
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 12px rgba(130, 60, 200, 0.5);
      letter-spacing: 1px;
    }
    .tagline {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    /* ── Link Cards ─────────────────────────────────────────────── */
    .link-card {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255, 255, 255, 0.30);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.50);
      border-radius: 18px;
      padding: 14px 20px;
      text-decoration: none;
      color: #3d1b6e;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 4px 18px rgba(180, 100, 255, 0.15);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      animation: fadeUp 0.6s ease both;
    }
    .link-card:hover {
      transform: translateY(-3px) scale(1.015);
      box-shadow: 0 8px 30px rgba(160, 80, 255, 0.30);
      background: rgba(255, 255, 255, 0.45);
    }
    .link-card:active {
      transform: scale(0.98);
    }

    /* staggered entrance */
    .link-card:nth-child(1)  { animation-delay: 0.10s; }
    .link-card:nth-child(2)  { animation-delay: 0.18s; }
    .link-card:nth-child(3)  { animation-delay: 0.26s; }
    .link-card:nth-child(4)  { animation-delay: 0.34s; }
    .link-card:nth-child(5)  { animation-delay: 0.42s; }
    .link-card:nth-child(6)  { animation-delay: 0.50s; }
    .link-card:nth-child(7)  { animation-delay: 0.58s; }

    .link-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .link-label {
      flex: 1;
    }
    .link-label .name  { display: block; font-size: 1rem; }
    .link-label .sub   { display: block; font-size: 0.75rem; font-weight: 500; opacity: 0.65; margin-top: 1px; }

    /* ── Icon background colours ────────────────────────────────── */
    .icon-github    { background: #24292e; color: #fff; }
    .icon-instagram { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285aeb 90%); color: #fff; }
    .icon-tiktok    { background: #010101; color: #fff; }
    .icon-discord   { background: #5865f2; color: #fff; }
    .icon-snapchat  { background: #fffc00; color: #000; }
    .icon-x         { background: #000; color: #fff; }

    /* ── Footer ─────────────────────────────────────────────────── */
    footer {
      margin-top: 30px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.7);
      text-align: center;
      animation: fadeUp 0.6s 0.7s ease both;
    }

    /* ── Keyframes ──────────────────────────────────────────────── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>

<script>
  /* Cotton-candy background that darkens as you scroll */
  (function () {
    // Colour stops at top (light cotton candy)
    const topColors = {
      c1: [255, 214, 245],   // soft pink
      c2: [249, 188, 232],   // mid pink
      c3: [200, 170, 255],   // lavender
      c4: [160, 196, 255],   // sky blue
    };
    // Colour stops at bottom (dark cotton candy)
    const botColors = {
      c1: [140,  60, 160],   // deep magenta
      c2: [100,  40, 140],   // dark violet
      c3: [ 50,  20, 120],   // indigo
      c4: [ 20,  10,  80],   // deep navy-purple
    };

    function lerp(a, b, t) { return Math.round(a + (b - a) * t); }
    function blendColor(top, bot, t) {
      return [lerp(top[0], bot[0], t), lerp(top[1], bot[1], t), lerp(top[2], bot[2], t)];
    }
    function rgb(c) { return `rgb(${c[0]},${c[1]},${c[2]})`; }

    function updateBackground() {
      const scrollTop  = window.scrollY;
      const maxScroll  = Math.max(1, document.body.scrollHeight - window.innerHeight);
      const t          = Math.min(scrollTop / maxScroll, 1);

      const c1 = rgb(blendColor(topColors.c1, botColors.c1, t));
      const c2 = rgb(blendColor(topColors.c2, botColors.c2, t));
      const c3 = rgb(blendColor(topColors.c3, botColors.c3, t));
      const c4 = rgb(blendColor(topColors.c4, botColors.c4, t));

      document.body.style.background =
        `linear-gradient(180deg, ${c1} 0%, ${c2} 20%, ${c3} 60%, ${c4} 100%)`;
      document.body.style.backgroundAttachment = 'fixed';
    }

    window.addEventListener('scroll', updateBackground, { passive: true });
    updateBackground(); // run once on load
  })();
</script>
